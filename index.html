      <!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Для тебя 💖</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: #06020e;
      font-family: 'Cormorant Garamond', serif;
    }

    /* ── SKY ── */
    .sky {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse at 40% 0%, #1e0840 0%, #0d0320 45%, #06020e 100%);
    }

    /* ── MOON ── */
    .moon {
      position: fixed; top: 7vh; right: 10vw;
      width: 88px; height: 88px; border-radius: 50%;
      background: radial-gradient(circle at 36% 30%, #f0eeea 0%, #dcdad4 30%, #c8c5bc 60%, #b0ada4 85%, #9a9790 100%);
      box-shadow: 0 0 18px 6px rgba(220,218,210,.12), 0 0 50px 18px rgba(200,196,185,.07), inset -10px -8px 22px rgba(60,55,48,.32), inset 4px 3px 10px rgba(255,252,245,.18);
      opacity: 0; transform: translateY(-40px) scale(.65);
      transition: opacity 2.2s ease .4s, transform 2.6s cubic-bezier(.34,1.5,.64,1) .2s;
      z-index: 2;
    }
    .moon::before { content: ''; position: absolute; width: 14px; height: 14px; border-radius: 50%; background: rgba(80,75,68,.22); filter: blur(2px); top: 22%; left: 24%; box-shadow: 18px 28px 0 6px rgba(80,75,68,.13), 38px 10px 0 4px rgba(80,75,68,.15); }
    .moon::after  { content: ''; position: absolute; width: 8px; height: 8px; border-radius: 50%; background: rgba(80,75,68,.18); filter: blur(1.5px); top: 55%; left: 50%; box-shadow: -14px -8px 0 3px rgba(80,75,68,.12); }
    .moon.visible { opacity: 1; transform: translateY(0) scale(1); }

    /* ── STARS ── */
    .stars-layer {
      position: fixed; inset: 0; z-index: 1;
      pointer-events: none; opacity: 0;
      transition: opacity 1.6s ease;
    }
    .stars-layer.visible { opacity: 1; }
    .star {
      position: absolute; border-radius: 50%; background: #fff;
      animation: twinkle var(--dur, 3s) var(--del, 0s) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      0%   { opacity: .08; transform: scale(.5); }
      100% { opacity: var(--op, .9); transform: scale(1.3); }
    }
    .shooting-star {
      position: absolute; width: 1.5px; height: 90px;
      background: linear-gradient(to top, #fff, transparent);
      opacity: 0; border-radius: 1px;
      animation: shoot 7s var(--sd, 3s) ease-in infinite;
    }
    @keyframes shoot {
      0%   { opacity: 0;  transform: rotate(38deg) translateY(0); }
      4%   { opacity: .9; }
      22%  { opacity: 0;  transform: rotate(38deg) translateY(280px); }
      100% { opacity: 0;  transform: rotate(38deg) translateY(280px); }
    }

    /* ── MESSAGE ── */
    .message-overlay {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; opacity: 0;
      transition: opacity 1.8s ease 1s;
    }
    .message-overlay.visible { opacity: 1; pointer-events: auto; }
    .message-box {
      background: rgba(6,2,14,.78); backdrop-filter: blur(22px);
      border: 1px solid rgba(255,120,170,.28); border-radius: 26px;
      padding: 50px 58px; max-width: 500px; text-align: center;
      box-shadow: 0 0 60px rgba(200,60,110,.18), inset 0 1px 0 rgba(255,255,255,.06);
      animation: floatMsg 4s ease-in-out infinite;
    }
    @keyframes floatMsg { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
    .message-text {
      font-size: clamp(1.25rem, 2.8vw, 1.7rem);
      color: #ffd6e8; font-style: italic; font-weight: 300;
      line-height: 1.75; text-shadow: 0 0 28px rgba(255,120,170,.38);
    }
    .heart { display: inline-block; animation: hbeat 1.2s ease-in-out infinite; }
    @keyframes hbeat { 0%,100%{transform:scale(1)} 50%{transform:scale(1.35)} }

    /* ── SCENE ── */
    .scene { position: relative; width: 100vw; height: 100vh; z-index: 10; }

    /* ── GROUND ── */
    .ground {
      position: absolute; bottom: 0; width: 100%; height: 18vh;
      background: linear-gradient(to top, #030809, #061410, #0a1f12, #0a1f13 60%, transparent);
      border-radius: 50% 50% 0 0 / 10% 10% 0 0; z-index: 5;
    }

    /* ── FLOWERS WRAP ── */
    .flowers-wrap {
      position: absolute; bottom: 8vh; left: 50%; transform: translateX(-50%);
      width: 95vw; max-width: 1100px; height: 80vh; z-index: 20;
    }

    /* ── STEM ── */
    .stem-body {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 8px; border-radius: 4px; transform-origin: bottom center;
      background: linear-gradient(to top, #0d3b2e, #1e6b42, #2a9b5e);
      box-shadow: inset 1px 0 2px rgba(255,255,255,.15), inset -1px 0 2px rgba(0,0,0,.3);
      animation: stem-grow 1.2s var(--sd, 0s) backwards;
    }
    @keyframes stem-grow { from { height: 0; } }

    /* ── FLOWER INSTANCE ── */
    .flower-instance {
      position: absolute; bottom: 0; transform-origin: bottom center;
    }

    /* ── PEONY ── */
    .peony-head {
      position: absolute; border-radius: 50%;
      animation: bloom-in 1s var(--bd, 0s) cubic-bezier(.34,1.56,.64,1) backwards;
    }
    .peony-petal {
      position: absolute;
      border-radius: 50% 50% 40% 60% / 60% 60% 40% 40%;
      transform-origin: bottom center;
    }

    /* ── TULIP ── */
    .tulip-head { position: absolute; bottom: 0; }
    .tulip-petal {
      position: absolute; bottom: 0;
      border-radius: 50% 50% 10% 10% / 80% 80% 20% 20%;
      transform-origin: bottom center;
      animation: bloom-in .8s var(--bd, 0s) cubic-bezier(.34,1.56,.64,1) backwards;
    }

    /* ── RANUNCULUS ── */
    .ranunc-head { position: absolute; border-radius: 50%; }
    .ranunc-petal {
      position: absolute; border-radius: 50%;
      transform-origin: bottom center;
    }

    /* ── BLOOM / SWAY ── */
    @keyframes bloom-in {
      0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
      60%  { transform: scale(1.08) rotate(4deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes petal-open {
      0%   { transform: var(--pt0); opacity: 0; }
      100% { transform: var(--pt1); opacity: 1; }
    }

    @keyframes sway1 { 0%,100%{transform:rotate(var(--br,0deg)) translateX(-50%)} 50%{transform:rotate(calc(var(--br,0deg) + 2.5deg)) translateX(-50%)} }
    @keyframes sway2 { 0%,100%{transform:rotate(var(--br,0deg)) translateX(-50%)} 50%{transform:rotate(calc(var(--br,0deg) - 2deg)) translateX(-50%)} }
    @keyframes sway3 { 0%,100%{transform:rotate(var(--br,0deg)) translateX(-50%)} 33%{transform:rotate(calc(var(--br,0deg) + 2deg)) translateX(-50%)} 66%{transform:rotate(calc(var(--br,0deg) - 1.5deg)) translateX(-50%)} }

    /* ── GRASS SVG ── */
    .grass-svg { position: absolute; bottom: 0; left: 0; width: 100%; pointer-events: none; }

    /* ── FIREFLY ── */
    .firefly {
      position: absolute; width: 4px; height: 4px; border-radius: 50%;
      background: #aeffc8; box-shadow: 0 0 6px 3px rgba(174,255,200,.6);
      animation: fly var(--ft,6s) var(--fd,0s) ease-in-out infinite;
      pointer-events: none; z-index: 25;
    }
    @keyframes fly {
      0%  { transform: translate(0,0); opacity: 0; }
      10% { opacity: .8; }
      40% { transform: translate(var(--fx,30px),var(--fy,-50px)); opacity: .9; }
      70% { transform: translate(var(--fx2,10px),var(--fy2,-100px)); opacity: .6; }
      90% { opacity: .2; }
      100%{ transform: translate(var(--fx3,60px),var(--fy3,-140px)); opacity: 0; }
    }

    /* ── BUTTON ── */
    .btn-wrap { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); z-index: 50; }
    .heart-btn {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem; font-style: italic; color: #fff0f5; letter-spacing: .03em;
      background: linear-gradient(135deg, rgba(190,50,100,.85), rgba(240,70,120,.9));
      border: 1px solid rgba(255,130,170,.45); border-radius: 50px; padding: 14px 36px;
      cursor: pointer;
      box-shadow: 0 4px 22px rgba(190,50,100,.45), 0 0 36px rgba(240,70,120,.12);
      animation: bpulse 2.6s ease-in-out infinite;
      transition: transform .18s, box-shadow .18s;
      white-space: nowrap;
    }
    .heart-btn:hover { transform: scale(1.07); box-shadow: 0 6px 34px rgba(190,50,100,.7); }
    .heart-btn:active { transform: scale(.96); }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      .btn-wrap {
        bottom: max(24px, env(safe-area-inset-bottom, 24px));
        width: auto;
      }
      .heart-btn {
        font-size: 1.15rem;
        padding: 14px 32px;
      }
      .message-box {
        padding: 36px 28px;
        margin: 16px;
        max-width: calc(100vw - 32px);
        border-radius: 20px;
      }
      .message-text {
        font-size: clamp(1.1rem, 4.5vw, 1.4rem);
        line-height: 1.8;
      }
    }
    @keyframes bpulse {
      0%,100%{ box-shadow: 0 4px 22px rgba(190,50,100,.45), 0 0 36px rgba(240,70,120,.12); }
      50%    { box-shadow: 0 4px 30px rgba(190,50,100,.75), 0 0 55px rgba(240,70,120,.3); }
    }

    /* ── FLOAT HEARTS ── */
    .float-heart {
      position: fixed; pointer-events: none; z-index: 99;
      font-size: 1.6rem; animation: floatUp 2.5s ease-out forwards;
    }
    @keyframes floatUp {
      0%  { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
      100%{ opacity: 0; transform: translateY(-200px) scale(.45) rotate(28deg); }
    }
  </style>
</head>
<body>

  <div class="sky" id="sky"></div>
  <div class="stars-layer" id="starsLayer"></div>
  <div class="moon" id="moon"></div>

  <div class="message-overlay" id="msgOverlay">
    <div class="message-box">
      <p class="message-text">
        Звёзд много, а луна одна —<br>
        ты моя луна ❤️<br><br>
        Спасибо тебе за этот год,<br>надеюсь следующие будут только лучше ❤️
      </p>
    </div>
  </div>

  <div class="scene">
    <div class="flowers-wrap" id="flowersWrap"></div>
    <div class="ground"></div>
  </div>

  <div class="btn-wrap">
    <button class="heart-btn" id="heartBtn">Нажми 💓</button>
  </div>

<script>
const rand = (a, b) => a + Math.random() * (b - a);
const pick = arr => arr[Math.floor(Math.random() * arr.length)];

// ── STARS ──
function buildStars() {
  const layer = document.getElementById('starsLayer');
  for (let i = 0; i < 200; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = rand(1, 3.5);
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${rand(0,75)}%;left:${rand(0,100)}%;--op:${rand(.35,1)};--dur:${rand(2,5.5)}s;--del:${rand(0,5)}s;`;
    layer.appendChild(s);
  }
  for (let i = 0; i < 5; i++) {
    const ss = document.createElement('div');
    ss.className = 'shooting-star';
    ss.style.cssText = `top:${rand(3,28)}%;left:${rand(5,75)}%;--sd:${rand(0,12)}s;`;
    layer.appendChild(ss);
  }
}

// ── SVG GRASS ──
function buildGrass(container, W) {
  const H = 340;
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('preserveAspectRatio', 'none');
  svg.classList.add('grass-svg');
  svg.style.height = H + 'px';

  const greens = ['#0d4a2e','#1a6b42','#0f5535','#2a8b52','#14783c','#0b3d25','#237a45'];
  const count = Math.floor(W / 6.5);

  for (let i = 0; i < count; i++) {
    const x    = rand(0, W);
    const h    = rand(45, 190);
    const w    = rand(3, 10);
    const tip  = x + rand(-h * .4, h * .4);
    const cp   = x + rand(-w * 2, w * 2);
    const cpy  = H - h * .55;
    const color = pick(greens);
    const swayAmt = rand(.8, 2.5);
    const swayDur = rand(2, 5) + 's';
    const swayDel = rand(0, 4) + 's';

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M${x-w/2},${H} Q${cp},${cpy} ${tip},${H-h} Q${cp+w},${cpy} ${x+w/2},${H} Z`);
    path.setAttribute('fill', color);
    path.setAttribute('opacity', rand(.68, 1));

    const anim = document.createElementNS('http://www.w3.org/2000/svg', 'animateTransform');
    anim.setAttribute('attributeName', 'transform');
    anim.setAttribute('type', 'rotate');
    anim.setAttribute('values', `0 ${x} ${H}; ${swayAmt} ${x} ${H}; ${-swayAmt*.55} ${x} ${H}; 0 ${x} ${H}`);
    anim.setAttribute('keyTimes', '0; 0.38; 0.7; 1');
    anim.setAttribute('dur', swayDur);
    anim.setAttribute('begin', swayDel);
    anim.setAttribute('repeatCount', 'indefinite');
    anim.setAttribute('calcMode', 'spline');
    anim.setAttribute('keySplines', '.45 0 .55 1; .45 0 .55 1; .45 0 .55 1');
    path.appendChild(anim);
    svg.appendChild(path);
  }

  // dark foreground overlay blades
  for (let i = 0; i < 70; i++) {
    const x   = rand(0, W);
    const h   = rand(18, 65);
    const w   = rand(4, 9);
    const tip = x + rand(-12, 12);
    const cp  = x;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M${x-w/2},${H} Q${cp},${H-h*.6} ${tip},${H-h} Q${cp+w},${H-h*.6} ${x+w/2},${H} Z`);
    path.setAttribute('fill', pick(['#061e0f','#0a2e18','#081c0e']));
    path.setAttribute('opacity', rand(.78, 1));
    svg.appendChild(path);
  }

  container.appendChild(svg);
}

// ── FIREFLIES ──
function buildFireflies(container) {
  for (let i = 0; i < 14; i++) {
    const f = document.createElement('div');
    f.className = 'firefly';
    f.style.cssText = `left:${rand(5,95)}%;bottom:${rand(12,65)}%;--ft:${rand(4,9)}s;--fd:${rand(0,6)}s;--fx:${rand(-60,60)}px;--fy:${rand(-55,-20)}px;--fx2:${rand(-40,80)}px;--fy2:${rand(-110,-65)}px;--fx3:${rand(20,120)}px;--fy3:${rand(-150,-105)}px;`;
    container.appendChild(f);
  }
}

// ── PEONY ──
function buildPeony(container, cfg) {
  const { left, stemH, rot, delay, size, colors } = cfg;
  const sw = pick([1,2,3]);
  const wrap = document.createElement('div');
  wrap.className = 'flower-instance';
  wrap.style.cssText = `left:${left}%;--br:${rot}deg;transform:rotate(${rot}deg) translateX(-50%);animation:sway${sw} ${rand(3,5.5)}s ${rand(0,1)}s ease-in-out infinite;`;

  // stem
  const stem = document.createElement('div');
  stem.className = 'stem-body';
  stem.style.cssText = `height:${stemH}px;--sd:${delay}s;`;
  wrap.appendChild(stem);

  // leaves
  const leafDefs = [
    { side:'l', pct:.36, w:rand(22,32), h:rand(12,19), ang:-44 },
    { side:'r', pct:.54, w:rand(20,28), h:rand(11,17), ang: 42 },
    { side:'l', pct:.68, w:rand(16,22), h:rand(9,13),  ang:-50 },
  ];
  leafDefs.forEach(ld => {
    const el = document.createElement('div');
    const bot = stemH * ld.pct;
    const base = `position:absolute;width:${ld.w}px;height:${ld.h}px;background:linear-gradient(135deg,#0d4a2e,#1a6b42 60%,#2a9b5e);border-radius:50% 0 50% 0;box-shadow:inset 0 2px 4px rgba(0,0,0,.3);animation:stem-grow .8s ${delay+.25}s backwards;`;
    if (ld.side === 'l') {
      el.style.cssText = `${base}right:8px;bottom:${bot}px;transform-origin:right bottom;transform:rotate(${ld.ang}deg) scaleX(-1);`;
    } else {
      el.style.cssText = `${base}left:8px;bottom:${bot}px;transform-origin:left bottom;transform:rotate(${ld.ang}deg);`;
    }
    wrap.appendChild(el);
  });

  // flower head
  const head = document.createElement('div');
  head.className = 'peony-head';
  const S = size;
  head.style.cssText = `width:${S}px;height:${S}px;bottom:${stemH - S/2}px;left:${-S/2 + 4}px;--bd:${delay+.85}s;`;

  const layers = [
    { n:5,  ro:S*.60, rw:S*.50, rh:S*.58 },
    { n:7,  ro:S*.46, rw:S*.42, rh:S*.50 },
    { n:9,  ro:S*.33, rw:S*.34, rh:S*.43 },
    { n:11, ro:S*.21, rw:S*.26, rh:S*.35 },
    { n:13, ro:S*.11, rw:S*.19, rh:S*.27 },
    { n:15, ro:S*.04, rw:S*.13, rh:S*.19 },
  ];

  layers.forEach((layer, li) => {
    const c0 = colors[li % colors.length];
    const c1 = colors[(li+1) % colors.length];
    for (let i = 0; i < layer.n; i++) {
      const angle = (360 / layer.n) * i + li * 10.8;
      const ar = angle * Math.PI / 180;
      const px = S/2 + Math.sin(ar) * layer.ro;
      const py = S/2 - Math.cos(ar) * layer.ro;
      const p = document.createElement('div');
      p.className = 'peony-petal';
      p.style.cssText = `
        width:${layer.rw}px;height:${layer.rh}px;
        left:${px - layer.rw/2}px;top:${py - layer.rh * .7}px;
        background:radial-gradient(ellipse at 45% 30%, ${c0}, ${c1} 85%);
        transform:rotate(${angle}deg);
        opacity:${.80 + li*.016};
        box-shadow:inset 0 2px 4px rgba(255,255,255,.22),inset 0 -3px 6px rgba(0,0,0,.18);
        animation:petal-open .55s ${delay+.9+li*.07}s backwards;
        --pt0:scale(0) rotate(${angle}deg);--pt1:rotate(${angle}deg);
      `;
      head.appendChild(p);
    }
  });

  // stamen ring
  for (let i = 0; i < 18; i++) {
    const a = (360/18)*i, ar = a*Math.PI/180;
    const sx = S/2 + Math.sin(ar)*S*.12;
    const sy = S/2 - Math.cos(ar)*S*.12;
    const st = document.createElement('div');
    st.style.cssText = `position:absolute;width:${S*.03}px;height:${S*.05}px;border-radius:50%;background:#ffe060;left:${sx-S*.015}px;top:${sy-S*.025}px;opacity:.88;transform:rotate(${a}deg);`;
    head.appendChild(st);
  }

  // center disk
  const center = document.createElement('div');
  center.style.cssText = `position:absolute;width:${S*.12}px;height:${S*.12}px;border-radius:50%;background:radial-gradient(circle,#fffde0,#ffd84a 55%,#c89010);left:${S/2-S*.06}px;top:${S/2-S*.06}px;box-shadow:0 0 8px rgba(255,200,50,.55);z-index:10;`;
  head.appendChild(center);
  // center highlight
  const chl = document.createElement('div');
  chl.style.cssText = `position:absolute;width:${S*.05}px;height:${S*.05}px;border-radius:50%;background:rgba(255,255,240,.6);left:${S/2-S*.07}px;top:${S/2-S*.07}px;z-index:11;`;
  head.appendChild(chl);

  wrap.appendChild(head);
  container.appendChild(wrap);
}

// ── TULIP ──
function buildTulip(container, cfg) {
  const { left, stemH, rot, delay, size, color1, color2 } = cfg;
  const sw = pick([1,2,3]);
  const wrap = document.createElement('div');
  wrap.className = 'flower-instance';
  wrap.style.cssText = `left:${left}%;--br:${rot}deg;transform:rotate(${rot}deg) translateX(-50%);animation:sway${sw} ${rand(3,5.5)}s ${rand(0,1)}s ease-in-out infinite;`;

  const stem = document.createElement('div');
  stem.className = 'stem-body';
  stem.style.cssText = `height:${stemH}px;width:7px;--sd:${delay}s;`;
  wrap.appendChild(stem);

  // leaves
  const ll = document.createElement('div');
  ll.style.cssText = `position:absolute;width:30px;height:14px;background:linear-gradient(135deg,#0d4a2e,#2a9b5e);border-radius:50% 0 50% 0;right:7px;bottom:${stemH*.38}px;transform-origin:right bottom;transform:rotate(-42deg) scaleX(-1);animation:stem-grow .8s ${delay+.2}s backwards;`;
  const lr = document.createElement('div');
  lr.style.cssText = `position:absolute;width:27px;height:13px;background:linear-gradient(135deg,#0d4a2e,#2a9b5e);border-radius:50% 0 50% 0;left:7px;bottom:${stemH*.55}px;transform-origin:left bottom;transform:rotate(36deg);animation:stem-grow .8s ${delay+.38}s backwards;`;
  wrap.appendChild(ll); wrap.appendChild(lr);

  const cup = document.createElement('div');
  cup.className = 'tulip-head';
  const cw = size, ch = size * 1.22;
  cup.style.cssText = `width:${cw}px;height:${ch}px;bottom:${stemH - ch*.14}px;left:${-cw/2+3.5}px;animation:bloom-in .9s ${delay+.72}s cubic-bezier(.34,1.56,.64,1) backwards;`;

  const pd = [
    { x:.50, w:.56, h:.96, r:0,   c:color1, z:1 },
    { x:.18, w:.50, h:.88, r:-22, c:color2, z:2 },
    { x:.82, w:.50, h:.88, r: 22, c:color2, z:2 },
    { x:.32, w:.45, h:.78, r:-11, c:color1+'cc', z:3 },
    { x:.68, w:.45, h:.78, r: 11, c:color1+'cc', z:3 },
    { x:.50, w:.38, h:.68, r:0,   c:color2, z:4 },
  ];
  pd.forEach((p, pi) => {
    const petal = document.createElement('div');
    petal.className = 'tulip-petal';
    petal.style.cssText = `
      width:${p.w*cw}px;height:${p.h*ch}px;left:${p.x*cw - p.w*cw/2}px;
      background:linear-gradient(to top,${p.c},${p.c}e0 55%,${color2}88);
      transform:rotate(${p.r}deg);z-index:${p.z};
      box-shadow:inset 2px 0 8px rgba(255,255,255,.2),inset -2px 0 6px rgba(0,0,0,.2);
      --bd:${delay+.72+pi*.06}s;
    `;
    cup.appendChild(petal);
    // highlight stripe
    const hl = document.createElement('div');
    hl.style.cssText = `position:absolute;width:3px;height:${p.h*ch*.55}px;background:linear-gradient(to bottom,rgba(255,255,255,.25),transparent);border-radius:2px;left:${p.x*cw}px;bottom:${p.h*ch*.22}px;transform:rotate(${p.r}deg);pointer-events:none;`;
    cup.appendChild(hl);
  });
  wrap.appendChild(cup);
  container.appendChild(wrap);
}

// ── RANUNCULUS ──
function buildRanunc(container, cfg) {
  const { left, stemH, rot, delay, size, colors } = cfg;
  const sw = pick([1,2,3]);
  const wrap = document.createElement('div');
  wrap.className = 'flower-instance';
  wrap.style.cssText = `left:${left}%;--br:${rot}deg;transform:rotate(${rot}deg) translateX(-50%);animation:sway${sw} ${rand(2.5,4.5)}s ${rand(0,1)}s ease-in-out infinite;`;

  const stem = document.createElement('div');
  stem.className = 'stem-body';
  stem.style.cssText = `height:${stemH}px;width:6px;--sd:${delay}s;`;
  wrap.appendChild(stem);

  const ll = document.createElement('div');
  ll.style.cssText = `position:absolute;width:25px;height:11px;background:linear-gradient(135deg,#0d4a2e,#2a9b5e);border-radius:50% 0 50% 0;right:6px;bottom:${stemH*.42}px;transform-origin:right bottom;transform:rotate(-46deg) scaleX(-1);animation:stem-grow .7s ${delay+.2}s backwards;`;
  wrap.appendChild(ll);

  const S = size;
  const head = document.createElement('div');
  head.className = 'ranunc-head';
  head.style.cssText = `width:${S}px;height:${S}px;bottom:${stemH-S*.5}px;left:${-S/2+3}px;animation:bloom-in .9s ${delay+.72}s cubic-bezier(.34,1.56,.64,1) backwards;`;

  const rings = [
    { n:6,  ro:S*.50, rw:S*.36, rh:S*.36 },
    { n:8,  ro:S*.39, rw:S*.30, rh:S*.30 },
    { n:10, ro:S*.28, rw:S*.24, rh:S*.24 },
    { n:12, ro:S*.19, rw:S*.19, rh:S*.19 },
    { n:14, ro:S*.12, rw:S*.15, rh:S*.15 },
    { n:16, ro:S*.06, rw:S*.11, rh:S*.11 },
    { n:18, ro:S*.025,rw:S*.08, rh:S*.08 },
  ];
  rings.forEach((rd, ri) => {
    const c0 = colors[ri % colors.length];
    const c1 = colors[(ri+1) % colors.length];
    for (let i = 0; i < rd.n; i++) {
      const angle = (360/rd.n)*i + ri*8.5;
      const ar = angle*Math.PI/180;
      const px = S/2 + Math.sin(ar)*rd.ro;
      const py = S/2 - Math.cos(ar)*rd.ro;
      const p = document.createElement('div');
      p.className = 'ranunc-petal';
      p.style.cssText = `
        width:${rd.rw}px;height:${rd.rh}px;
        left:${px-rd.rw/2}px;top:${py-rd.rh/2}px;
        background:radial-gradient(ellipse at 38% 36%, ${c0}, ${c1});
        transform:rotate(${angle}deg);
        opacity:${.78+ri*.018};
        box-shadow:inset 0 1px 3px rgba(255,255,255,.28);
        animation:petal-open .5s ${delay+.75+ri*.06}s backwards;
        --pt0:scale(0);--pt1:scale(1);
      `;
      head.appendChild(p);
    }
  });

  // center
  const center = document.createElement('div');
  center.style.cssText = `position:absolute;width:${S*.13}px;height:${S*.13}px;border-radius:50%;background:radial-gradient(circle,#e8ffe0,#a8ee60 55%,#407020);left:${S/2-S*.065}px;top:${S/2-S*.065}px;box-shadow:0 0 6px rgba(100,220,80,.5);z-index:10;`;
  head.appendChild(center);
  const chl = document.createElement('div');
  chl.style.cssText = `position:absolute;width:${S*.05}px;height:${S*.05}px;border-radius:50%;background:rgba(255,255,240,.6);left:${S/2-S*.075}px;top:${S/2-S*.075}px;z-index:11;`;
  head.appendChild(chl);

  wrap.appendChild(head);
  container.appendChild(wrap);
}

// ── BUTTON ──
let revealed = false;
const pickE = a => a[Math.floor(Math.random()*a.length)];

document.getElementById('heartBtn').addEventListener('click', function() {
  for (let i = 0; i < 10; i++) {
    setTimeout(() => {
      const h = document.createElement('div');
      h.className = 'float-heart';
      h.textContent = pickE(['💖','💗','💓','💕','❤️','🌸','✨','⭐','🌙']);
      h.style.cssText = `left:${rand(25,75)}vw;bottom:${rand(55,85)}px;`;
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 2500);
    }, i * 115);
  }
  if (!revealed) {
    revealed = true;
    document.getElementById('starsLayer').classList.add('visible');
    document.getElementById('moon').classList.add('visible');
    setTimeout(() => document.getElementById('msgOverlay').classList.add('visible'), 900);
    this.style.transition = 'opacity .6s';
    this.style.opacity = '0';
    this.style.pointerEvents = 'none';
  }
});
