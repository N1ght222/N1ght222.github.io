<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Heart</title>
  <style>
    :root {
      --background-color-center: #1b2735;
      --background-color-edge: #090a0f;
    }

    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-image: radial-gradient(ellipse at center, var(--background-color-center) 0%, var(--background-color-edge) 100%);
      height: 100vh;
    }

    #particleCanvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }
  </style>
</head>
<body>
  <canvas id="particleCanvas"></canvas>

  <script>
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', () => { resize(); initParticles(); });

    const PARTICLE_COUNT = 220;
    const HEART_RATIO = 0.55; // fraction of particles forming the heart shape
    let particles = [];
    let mouse = { x: canvas.width / 2, y: canvas.height / 2 };

    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('touchmove', e => {
      mouse.x = e.touches[0].clientX;
      mouse.y = e.touches[0].clientY;
    });

    // Heart parametric equation
    function heartPoint(t, cx, cy, scale) {
      const x = cx + scale * 16 * Math.pow(Math.sin(t), 3);
      const y = cy - scale * (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
      return { x, y };
    }

    class Particle {
      constructor(isHeart) {
        this.isHeart = isHeart;
        this.reset();
      }

      reset() {
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const scale = Math.min(canvas.width, canvas.height) * 0.028;

        if (this.isHeart) {
          // Place on heart shape
          const t = Math.random() * Math.PI * 2;
          const pt = heartPoint(t, cx, cy, scale);
          this.tx = pt.x + (Math.random() - 0.5) * scale * 1.5;
          this.ty = pt.y + (Math.random() - 0.5) * scale * 1.5;
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.progress = 0;
          this.speed = 0.005 + Math.random() * 0.008;
          this.size = 1.2 + Math.random() * 2.2;
          const hue = 340 + Math.random() * 30;
          const sat = 70 + Math.random() * 30;
          const light = 55 + Math.random() * 30;
          this.color = `hsl(${hue}, ${sat}%, ${light}%)`;
          this.glowColor = `hsla(${hue}, ${sat}%, ${light}%, 0.35)`;
        } else {
          // Floating ambient particle (star-like)
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.vx = (Math.random() - 0.5) * 0.3;
          this.vy = (Math.random() - 0.5) * 0.3 - 0.05;
          this.size = 0.5 + Math.random() * 1.5;
          this.alpha = 0.2 + Math.random() * 0.7;
          this.alphaDir = (Math.random() - 0.5) * 0.01;
          const hue = 200 + Math.random() * 160;
          this.color = `hsla(${hue}, 80%, 75%, ${this.alpha})`;
        }
      }

      update() {
        if (this.isHeart) {
          this.progress += this.speed;
          if (this.progress >= 1) {
            // Reassign to new heart point after reaching target
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const scale = Math.min(canvas.width, canvas.height) * 0.028;
            const t = Math.random() * Math.PI * 2;
            const pt = heartPoint(t, cx, cy, scale);
            this.x = this.tx;
            this.y = this.ty;
            this.tx = pt.x + (Math.random() - 0.5) * scale * 1.5;
            this.ty = pt.y + (Math.random() - 0.5) * scale * 1.5;
            this.progress = 0;
            this.speed = 0.003 + Math.random() * 0.006;
          }
          // Smooth lerp toward target
          const ease = this.progress < 0.5
            ? 2 * this.progress * this.progress
            : 1 - Math.pow(-2 * this.progress + 2, 2) / 2;
          this.drawX = this.x + (this.tx - this.x) * ease;
          this.drawY = this.y + (this.ty - this.y) * ease;

          // Subtle attraction to mouse
          const dx = mouse.x - this.drawX;
          const dy = mouse.y - this.drawY;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 120) {
            const force = (120 - dist) / 120 * 3;
            this.drawX += dx / dist * force;
            this.drawY += dy / dist * force;
          }
        } else {
          this.x += this.vx;
          this.y += this.vy;
          this.alpha += this.alphaDir;
          if (this.alpha <= 0.1 || this.alpha >= 0.9) this.alphaDir *= -1;
          if (this.x < 0) this.x = canvas.width;
          if (this.x > canvas.width) this.x = 0;
          if (this.y < 0) this.y = canvas.height;
          if (this.y > canvas.height) this.y = 0;
          this.drawX = this.x;
          this.drawY = this.y;
        }
      }

      draw() {
        ctx.save();
        if (this.isHeart) {
          // Glow
          ctx.shadowBlur = 10;
          ctx.shadowColor = this.glowColor;
          ctx.beginPath();
          ctx.arc(this.drawX, this.drawY, this.size, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.fill();
        } else {
          ctx.globalAlpha = this.alpha;
          ctx.beginPath();
          ctx.arc(this.drawX, this.drawY, this.size, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.fill();
        }
        ctx.restore();
      }
    }

    function initParticles() {
      particles = [];
      const heartCount = Math.floor(PARTICLE_COUNT * HEART_RATIO);
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push(new Particle(i < heartCount));
      }
    }

    initParticles();

    // Pulse effect
    let pulse = 0;
    let pulseDir = 0.015;

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw subtle radial gradient overlay for depth
      const grad = ctx.createRadialGradient(
        canvas.width / 2, canvas.height / 2, 0,
        canvas.width / 2, canvas.height / 2, Math.max(canvas.width, canvas.height) * 0.6
      );
      grad.addColorStop(0, 'rgba(27,39,53,0)');
      grad.addColorStop(1, 'rgba(9,10,15,0.2)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      pulse += pulseDir;
      if (pulse > 1 || pulse < 0) pulseDir *= -1;

      for (const p of particles) {
        p.update();
        p.draw();
      }

      // Draw faint heart outline that pulses
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      const scale = Math.min(canvas.width, canvas.height) * 0.028;
      ctx.save();
      ctx.strokeStyle = `hsla(350, 80%, 65%, ${0.04 + pulse * 0.06})`;
      ctx.lineWidth = 1 + pulse;
      ctx.shadowBlur = 20 + pulse * 15;
      ctx.shadowColor = `hsla(350, 90%, 60%, ${0.2 + pulse * 0.2})`;
      ctx.beginPath();
      for (let i = 0; i <= 200; i++) {
        const t = (i / 200) * Math.PI * 2;
        const pt = heartPoint(t, cx, cy, scale);
        i === 0 ? ctx.moveTo(pt.x, pt.y) : ctx.lineTo(pt.x, pt.y);
      }
      ctx.closePath();
      ctx.stroke();
      ctx.restore();

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
