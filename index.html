<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crystal Heart</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lilita+One&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{overflow:hidden;background:#16000a;width:100vw;height:100vh;}
body{-webkit-font-smoothing:antialiased;color:#ffdada;}
canvas.webgl{position:fixed;width:100vw;height:100vh;top:0;left:0;outline:none;}
body::before{content:"";position:absolute;border:8px solid #ffdada33;inset:1rem;z-index:100;pointer-events:none;}
h1{position:absolute;top:10vh;left:2.5rem;right:1rem;text-align:center;font-family:"Lilita One",sans-serif;font-weight:900;font-size:max(1rem,3vh);z-index:10;pointer-events:none;text-shadow:0 0 20px #ff6b9d88;}
#play-music{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:14vh;height:14vh;background:rgba(255,100,150,0.15);border:2px solid rgba(255,150,180,0.5);border-radius:50%;color:#ffdada;cursor:pointer;z-index:200;display:flex;align-items:center;justify-content:center;transition:opacity 0.5s,box-shadow 0.3s;backdrop-filter:blur(4px);}
#play-music:hover{box-shadow:0 0 20px rgba(255,80,120,0.6);}
#play-music svg{width:4vh;}
#music-icon{position:absolute;bottom:3vh;right:3vh;z-index:200;opacity:0;transition:opacity 1s;pointer-events:none;}
#music-icon.visible{opacity:1;}
.music-note-wrapper{position:relative;width:48px;height:48px;display:flex;align-items:center;justify-content:center;}
.ring{position:absolute;width:48px;height:48px;border-radius:50%;border:2px solid transparent;border-top-color:#ff6b9d;border-right-color:#ff6b9d44;animation:spin 2s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.note-symbol{font-size:22px;animation:noteBounce 0.77s ease-in-out infinite alternate;filter:drop-shadow(0 0 6px #ff6b9d);color:#ffb3c1;user-select:none;}
@keyframes noteBounce{from{transform:scale(1) rotate(-10deg);}to{transform:scale(1.18) rotate(10deg);}}
.eq-bars{position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);display:flex;gap:3px;align-items:flex-end;height:12px;}
.eq-bar{width:4px;background:#ff6b9d;border-radius:2px;animation:eqAnim 0.5s ease-in-out infinite alternate;box-shadow:0 0 4px #ff6b9d88;}
.eq-bar:nth-child(1){animation-duration:0.4s;}
.eq-bar:nth-child(2){animation-duration:0.6s;animation-delay:0.1s;}
.eq-bar:nth-child(3){animation-duration:0.35s;animation-delay:0.05s;}
.eq-bar:nth-child(4){animation-duration:0.55s;animation-delay:0.15s;}
.eq-bar:nth-child(5){animation-duration:0.45s;animation-delay:0.08s;}
@keyframes eqAnim{from{height:3px;opacity:0.5;}to{height:12px;opacity:1;}}
</style>
</head>

<!-- Heart particles vertex shader -->
<script type="x-shader/x-vertex" id="vertexShader">
  #define M_PI 3.1415926535897932384626433832795
  uniform float uTime;
  uniform float uSize;
  uniform float uBeat;
  attribute float aScale;
  attribute vec3 aColor;
  attribute float random;
  attribute float random1;
  attribute float aSpeed;
  varying vec3 vColor;
  varying vec2 vUv;
  void main() {
    float sign = 2.0*(step(random,0.5)-0.5);
    float t = sign*mod(-uTime*aSpeed*0.005+10.0*aSpeed*aSpeed,M_PI);
    float a = pow(t,2.0)*pow((t-sign*M_PI),2.0);
    float radius = 0.14*(1.0+uBeat*0.22);
    vec3 myOffset = vec3(
      radius*16.0*pow(sin(t),2.0)*sin(t),
      radius*(13.0*cos(t)-5.0*cos(2.0*t)-2.0*cos(3.0*t)-cos(4.0*t)),
      0.15*(a*(random1-0.5))*sin(abs(10.0*(sin(0.2*uTime+0.2*random)))*t)
    );
    vec4 modelPosition = modelMatrix*vec4(myOffset,1.0);
    vec4 viewPosition = viewMatrix*modelPosition;
    viewPosition.xyz += position*aScale*uSize*pow(a,0.5)*0.5;
    gl_Position = projectionMatrix*viewPosition;
    vColor = aColor; vUv = uv;
  }
</script>
<script type="x-shader/x-fragment" id="fragmentShader">
  varying vec3 vColor; varying vec2 vUv;
  void main(){
    float s=distance(vUv,vec2(0.5))*2.0;
    s=1.0-s;
    gl_FragColor=vec4(s*vColor,1.0);
  }
</script>

<!-- Snow vertex shader -->
<script type="x-shader/x-vertex" id="vertexShader1">
  #define M_PI 3.1415926535897932384626433832795
  uniform float uTime; uniform float uSize;
  attribute float aScale; attribute vec3 aColor;
  attribute float phi; attribute float random; attribute float random1;
  varying vec3 vColor; varying vec2 vUv;
  void main(){
    float t=mod((-uTime+100.0)*0.06*random1+random*2.0*M_PI,2.0*M_PI);
    vec3 myOffset=vec3(5.85*cos(phi*t),2.0*(t-M_PI),3.0*sin(phi*t/t));
    vec4 modelPosition=modelMatrix*vec4(myOffset,1.0);
    vec4 viewPosition=viewMatrix*modelPosition;
    viewPosition.xyz+=position*aScale*uSize;
    gl_Position=projectionMatrix*viewPosition;
    vColor=aColor; vUv=uv;
  }
</script>
<script type="x-shader/x-fragment" id="fragmentShader1">
  varying vec3 vColor; varying vec2 vUv;
  void main(){
    float s=distance(vUv,vec2(0.5,0.65))*2.0;
    s=1.0-s;
    gl_FragColor=vec4(s*vColor*(s+0.3),1.0);
  }
</script>
